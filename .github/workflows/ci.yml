name: CollabSpace CI

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: collabspace
          POSTGRES_PASSWORD: collabspacepassword
          POSTGRES_DB: collabspacedb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-level: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run Database Migrations
        run: npx prisma db push
        env:
          DATABASE_URL: postgresql://collabspace:collabspacepassword@localhost:5432/collabspacedb?schema=public

      - name: Next.js Compile Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://collabspace:collabspacepassword@localhost:5432/collabspacedb?schema=public
          JWT_SECRET: collabspace_ci_test_jwt_secret_value_12345
          NEXT_PUBLIC_WS_URL: ws://localhost:3001

      - name: Run Eslint Checks
        run: npm run lint
